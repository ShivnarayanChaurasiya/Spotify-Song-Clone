<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> MY Spotify song play list for Student </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Spotify "> Spotify</li>
            <li>Home </li>
            <li>About </li>

        </ul>
    </nav>

    <div class="container">
 
        <div class="song-list"> 
        <h1> Best of NCS - No Copyright Sounds</h1>
        </div>
        <div class="songItem">
             <img src="covers/1.jpg" alt="1"> 
            <span>Let me Love You </span>
            <span class="songListPlay"><span class="timestemp"> 05:34 </span><i class="fas fa-3x fa-play-circle"></i></span>
        </div>
        </div>
        

        

    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" max="100">

        <div class="icons">
            <!-- fontawesome icons -->
            
            <i class="fas fa-3x fa-step-backward"></i>
            <i class="fas fa-3x fa-play-circle"></i>
            <i class="fas fa-3x fa-step-forward"></i>
        </div>
    </div>
 
</body>

</html>
